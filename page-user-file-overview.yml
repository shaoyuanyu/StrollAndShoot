        - generic [ref=e723]:
          - generic [ref=e725]:
            - generic [ref=e730]:
              - paragraph [ref=e731]:
                - text: 用户文件：登录到该终端设备的用户所拥有的文件，包括用户私有的
                - link "图片、视频" [ref=e732] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-guides/photoaccesshelper-overview
                - text: 、音频、文档等。
              - list [ref=e733]:
                - listitem [ref=e734]:
                  - paragraph [ref=e735]: 用户文件存放在用户目录下，归属于该设备上登录的用户。
                - listitem [ref=e736]:
                  - paragraph [ref=e737]:
                    - text: 用户文件存储位置主要分为
                    - link "内置存储" [ref=e738] [cursor=pointer]:
                      - /url: /consumer/cn/doc/harmonyos-guides/user-file-overview#内置存储
                    - text: 、
                    - link "外置存储" [ref=e739] [cursor=pointer]:
                      - /url: /consumer/cn/doc/harmonyos-guides/user-file-overview#外置存储
                    - text: 。
                - listitem [ref=e740]:
                  - paragraph [ref=e741]: 应用对用户文件的创建、访问、删除等行为，需要提前获取用户授权，或由用户操作完成。
              - heading "用户文件存储位置" [level=2] [ref=e743]
              - generic [ref=e744]:
                - heading "内置存储" [level=3] [ref=e745]
                - paragraph [ref=e746]: 内置存储，是指用户文件存储在终端设备的内部存储设备（空间）上。内置存储设备无法被移除。内置存储的用户文件主要有：
                - list [ref=e747]:
                  - listitem [ref=e748]:
                    - paragraph [ref=e749]: 用户特有的文件：这部分文件归属于登录该设备的用户，不同用户登录后，仅可看到该用户自己的文件。
                    - paragraph [ref=e750]: 按照这些文件的特征/属性，以及用户/应用的使用习惯，可分为：
                    - list [ref=e751]:
                      - listitem [ref=e752]:
                        - paragraph [ref=e753]: 图片/视频类媒体文件
                        - paragraph [ref=e754]: 所具有的特征包括拍摄时间、地点、旋转角度、文件宽高等信息，以媒体文件的形式存储在系统中，通常是以所有文件、相册的形式对外呈现，不会展示其在系统中存储的具体位置。
                      - listitem [ref=e755]:
                        - paragraph [ref=e756]: 音频类媒体文件
                        - paragraph [ref=e757]: 所具有的特征包括所属专辑、音频创作者、持续时间等信息，以媒体文件的形式存储在系统中，通常会以所有文件、专辑、作家等形式对外部呈现，不会展示其在系统中存储的具体位置。
                      - listitem [ref=e758]:
                        - paragraph [ref=e759]: 其他文件（统称为文档类文件）
                        - paragraph [ref=e760]: 以普通文件的形式存储在系统中，该类文件既包括普通的文本文件、压缩文件等，又包括以普通文件形式存储的图片/视频、音频文件，该类文件通常是以目录树的形式对外展示。
              - generic [ref=e761]:
                - heading "外置存储" [level=3] [ref=e762]
                - paragraph [ref=e763]: 外置存储，是指用户文件存储在外置可插拔设备上（如SD卡、U盘等）。外置存储设备上的文件，可以被所有登录到系统中的用户看到。
                - paragraph [ref=e764]: 外置存储设备具备可插拔属性，因此系统提供了设备插拔事件的监听及挂载功能，用于管理外置存储设备，该部分功能仅对系统应用开放。
                - paragraph [ref=e765]: 外置存储设备上的文件，全部以普通文件的形式呈现，和内置存储设备上的文档类文件一样，采用目录树的形式对外展示。
